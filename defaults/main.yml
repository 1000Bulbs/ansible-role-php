# defaults/main.yml
---
php_version: "5.6"

php_base_packages:
  - php-pear
  - php-php-gettext

php_extensions:
  - bcmath
  - curl
  - dev
  - gd
  - gmp
  - igbinary
  - imagick
  - mbstring
  - mcrypt
  - mysql
  - redis
  - soap
  - xdebug
  - xml
  - xmlrpc
  - yaml
  - zip

php_ini_sapi_configs:
  - sapi: apache2
    disable_functions:
      - pcntl_alarm
      - pcntl_fork
      - pcntl_waitpid
      - pcntl_wait
      - pcntl_wifexited
      - pcntl_wifstopped
      - pcntl_wifsignaled
      - pcntl_wexitstatus
      - pcntl_wtermsig
      - pcntl_wstopsig
      - pcntl_signal
      - pcntl_signal_dispatch
      - pcntl_get_last_error
      - pcntl_strerror
      - pcntl_sigprocmask
      - pcntl_sigwaitinfo
      - pcntl_sigtimedwait
      - pcntl_exec
      - pcntl_getpriority
      - pcntl_setpriority
    expose_php: "Off"
    memory_limit: "128M"

  - sapi: cli
    disable_functions: ""
    expose_php: "On"
    memory_limit: "-1"
